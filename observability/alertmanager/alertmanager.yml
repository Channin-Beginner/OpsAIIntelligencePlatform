# OpsAI 阶段二 2.A — Alertmanager 路由到 ops-api Webhook

global:
  resolve_timeout: 5m

route:
  receiver: opsai-webhook
  group_by: ['alertname', 'service', 'job']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h

receivers:
  - name: opsai-webhook
    webhook_configs:
      - url: 'http://127.0.0.1:8280/webhooks/alertmanager'
        send_resolved: true
