# OpsAI 阶段三 3.A — Grafana Loki 3.x 单节点本地开发（filesystem + tsdb v13）



auth_enabled: false



server:

  http_listen_port: 3100

  grpc_listen_port: 9096

  log_level: info



common:

  ring:

    instance_addr: 127.0.0.1

    kvstore:

      store: inmemory

  replication_factor: 1

  path_prefix: D:/YIBANWENJIANJI/BIANCHENG/OperationalTools/PrometheusStack/data/loki



schema_config:

  configs:

    - from: 2024-01-01

      store: tsdb

      object_store: filesystem

      schema: v13

      index:

        prefix: index_

        period: 24h



storage_config:

  filesystem:

    directory: D:/YIBANWENJIANJI/BIANCHENG/OperationalTools/PrometheusStack/data/loki/chunks

  tsdb_shipper:

    active_index_directory: D:/YIBANWENJIANJI/BIANCHENG/OperationalTools/PrometheusStack/data/loki/index

    cache_location: D:/YIBANWENJIANJI/BIANCHENG/OperationalTools/PrometheusStack/data/loki/index_cache



limits_config:

  # Required for OTLP log ingest via otel-collector → /otlp/v1/logs

  allow_structured_metadata: true

  retention_period: 168h



ruler:

  alertmanager_url: http://127.0.0.1:9093



analytics:

  reporting_enabled: false


